name: Update README GitHub Stats SVG

on:
  schedule:
    - cron: "0 0 12 * *" # Runs on the 12th of every month
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:   # ??? or stats: ???
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - name: Generate GitHub SVG stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stat svg cards" || exit 0
          #     OR  git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats SVG" && git push)
          git push
